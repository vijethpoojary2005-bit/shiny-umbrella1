<!DOCTYPE html>
<html>
<head>
    <title>Smart File Organizer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h1>Smart File Organizer</h1>
        <p class="subtitle">Organize your files instantly & professionally</p>

        <div class="form-group">
            <label>Select Folder</label>
            <input type="text" id="folderPath" placeholder="Enter folder path...">
        </div>

        <div class="form-group">
            <label>Sorting Option</label>
            <select id="sortOption">
                <option value="type">Sort by File Type</option>
                <option value="date">Sort by Date</option>
                <option value="both">Sort by Type + Date</option>
            </select>
        </div>

        <button class="organize-btn">Organize Files</button>

        <div class="status">
            Ready
        </div>
    </div>

</div>

<footer>
    Developed by Your Team © 2026
</footer>

</body>
</html>
